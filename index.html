<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 - Счётчик урона</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Standoff 2</h1>
            <p>Счётчик урона</p>
        </div>

        <div class="weapon-selector">
            <label for="weapon">Выберите оружие:</label>
            <select id="weapon">
                <option value="">-- Выберите оружие --</option>
                <optgroup label="Пистолеты">
                    <option value="glock18">Glock-18 (урон: 28)</option>
                    <option value="beretta">Beretta M9 (урон: 32)</option>
                    <option value="deagle">Desert Eagle (урон: 63)</option>
                </optgroup>
                <optgroup label="Штурмовые винтовки">
                    <option value="ak47">AK-47 (урон: 36)</option>
                    <option value="m4a1">M4A1 (урон: 33)</option>
                    <option value="famas">FAMAS (урон: 34)</option>
                </optgroup>
                <optgroup label="Снайперские винтовки">
                    <option value="awp">AWP Dragon Lore (урон: 115)</option>
                    <option value="scout">Scout (урон: 75)</option>
                </optgroup>
                <optgroup label="Дробовики">
                    <option value="m870">Remington M870 (урон: 60)</option>
                    <option value="xm1014">XM1014 (урон: 32)</option>
                </optgroup>
                <optgroup label="Пулемёты">
                    <option value="m249">M249 (урон: 31)</option>
                    <option value="negev">Negev (урон: 35)</option>
                </optgroup>
            </select>
        </div>

        <div class="weapon-info" id="weaponInfo">
            <p>Урон: <span id="weaponDamage">--</span></p>
            <p>Обойма: <span id="weaponMagazine">--</span></p>
        </div>

        <div class="damage-display">
            <div class="damage-counter">
                <h2>Общий урон</h2>
                <div class="damage-number" id="totalDamage">0</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="addDamage()">+</button>
            <button class="btn btn-danger" onclick="subtractDamage()">-</button>
            <button class="btn btn-reset" onclick="resetDamage()">Сброс</button>
        </div>

        <div class="custom-damage">
            <label for="customDamageInput">Добавить урон вручную:</label>
            <input type="number" id="customDamageInput" placeholder="Введите урон" min="0">
            <button class="btn btn-secondary" onclick="addCustomDamage()">Добавить</button>
        </div>

        <div class="stats">
            <h3>Статистика</h3>
            <p>Выстрелов: <span id="shotsCount">0</span></p>
            <p>Средний урон: <span id="averageDamage">0</span></p>
        </div>

        <footer>
            <p>Standoff 2 Damage Counter v1.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
